name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release-win:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Check if tag exists
        id: tag_check
        run: |
          if git rev-parse "v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
        shell: bash

      - uses: actions/setup-node@v4
        if: steps.tag_check.outputs.exists == 'false'
        with:
          node-version: 20
          cache: npm

      - run: npm ci
        if: steps.tag_check.outputs.exists == 'false'

      - name: Download yt-dlp
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          mkdir -p assets/bin
          curl -L -o assets/bin/yt-dlp.exe https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe
        shell: bash

      - name: Download ffmpeg
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          curl -L -o ffmpeg.zip https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip
          unzip -q ffmpeg.zip
          cp ffmpeg-master-latest-win64-gpl/bin/ffmpeg.exe assets/bin/ffmpeg.exe
          cp ffmpeg-master-latest-win64-gpl/bin/ffprobe.exe assets/bin/ffprobe.exe
          rm -rf ffmpeg.zip ffmpeg-master-latest-win64-gpl
        shell: bash

      - run: npm run dist
        if: steps.tag_check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifacts
        if: steps.tag_check.outputs.exists == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: release-win
          path: release/*.exe

      - name: Output version
        if: steps.tag_check.outputs.exists == 'false'
        run: echo "version=${{ steps.version.outputs.version }}" >> "$GITHUB_OUTPUT"
        shell: bash

    outputs:
      version: ${{ steps.version.outputs.version }}
      tag_exists: ${{ steps.tag_check.outputs.exists }}

  release-mac:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if tag exists
        id: tag_check
        run: |
          if git rev-parse "v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        if: steps.tag_check.outputs.exists == 'false'
        with:
          node-version: 20
          cache: npm

      - run: npm ci
        if: steps.tag_check.outputs.exists == 'false'

      - name: Download yt-dlp
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          mkdir -p assets/bin
          curl -L -o assets/bin/yt-dlp https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_macos
          chmod +x assets/bin/yt-dlp

      - name: Download ffmpeg
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          curl -L -o ffmpeg.zip https://evermeet.cx/ffmpeg/getrelease/zip
          unzip -o ffmpeg.zip -d assets/bin
          rm -f ffmpeg.zip
          curl -L -o ffprobe.zip https://evermeet.cx/ffmpeg/getrelease/ffprobe/zip
          unzip -o ffprobe.zip -d assets/bin
          rm -f ffprobe.zip
          chmod +x assets/bin/ffmpeg assets/bin/ffprobe

      - run: npm run dist
        if: steps.tag_check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload macOS artifacts
        if: steps.tag_check.outputs.exists == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: release-mac
          path: release/*.dmg

    outputs:
      tag_exists: ${{ steps.tag_check.outputs.exists }}

  publish-release:
    needs: [release-win, release-mac]
    if: needs.release-win.outputs.tag_exists == 'false'
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.release-win.outputs.version }}
          name: YTM2Local v${{ needs.release-win.outputs.version }}
          generate_release_notes: true
          files: |
            artifacts/release-win/*.exe
            artifacts/release-mac/*.dmg
