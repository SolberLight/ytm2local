name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version
        id: version
        run: echo "version=$(node -p \"require('./package.json').version\")" >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Check if tag exists
        id: tag_check
        run: |
          if git rev-parse "v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
        shell: bash

      - uses: actions/setup-node@v4
        if: steps.tag_check.outputs.exists == 'false'
        with:
          node-version: 20
          cache: npm

      - run: npm ci
        if: steps.tag_check.outputs.exists == 'false'

      - name: Download yt-dlp
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          mkdir -p assets/bin
          curl -L -o assets/bin/yt-dlp.exe https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe
        shell: bash

      - name: Download ffmpeg
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          curl -L -o ffmpeg.zip https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip
          unzip -q ffmpeg.zip
          cp ffmpeg-master-latest-win64-gpl/bin/ffmpeg.exe assets/bin/ffmpeg.exe
          cp ffmpeg-master-latest-win64-gpl/bin/ffprobe.exe assets/bin/ffprobe.exe
          rm -rf ffmpeg.zip ffmpeg-master-latest-win64-gpl
        shell: bash

      - run: npm run dist
        if: steps.tag_check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        if: steps.tag_check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: YTM2Local v${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: release/*.exe
